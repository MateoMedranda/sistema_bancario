# =============================================================================
#  docker-compose.yml  —  Camino ASINCRONO (Redis events)
#  Gateway publica evento -> Redis -> Usuarios consume (no bloquea)
#  Levantar:   docker compose up -d --build
# =============================================================================
services:

  db:
    env_file:
      - ../.env
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE_USUARIOS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d

  # Broker de EVENTOS (camino asincrono)
  redis:
    image: redis:7-alpine
    container_name: redis_broker
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redisdata:/data

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis_insight_ui
    ports:
      - "8001:8001"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # ─── Microservicio C: Usuarios (consumidor de EVENTOS por Redis) ───
  svc-usuarios:
    env_file:
      - ../.env
    build:
      context: ..
      dockerfile: apps/usuarios/Dockerfile
    environment:
      DB_HOST: db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_USUARIOS: ${DB_DATABASE_USUARIOS}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── API Gateway (publica eventos Redis, emisor no bloquea) ───
  gateway:
    env_file:
      - ../.env
    build:
      context: ..
      dockerfile: apps/sistema_bancario/Dockerfile
    environment:
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

# =============================================================================
#  docker-compose.yml  —  Camino SINCRONO (TCP chain)
#  Gateway -> Transacciones -> Cuentas
#  Levantar:   docker compose up -d --build
# =============================================================================
services:

  db:
    env_file:
      - ../.env
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE_USUARIOS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d

  # ─── Microservicio A: Transacciones (inicia la cadena sincrona por TCP) ───
  svc-transacciones:
    env_file:
      - ../.env
    build:
      context: ..
      dockerfile: apps/transacciones/Dockerfile
    environment:
      DB_HOST: db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_TRANSACCIONES: ${DB_DATABASE_TRANSACCIONES}
      SVC_CUENTAS_HOST: svc-cuentas
      SVC_CUENTAS_PORT: 4002
      TRANSACCIONES_PORT: 4003
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ─── Microservicio B: Cuentas (segundo salto de la cadena sincrona) ───
  svc-cuentas:
    env_file:
      - ../.env
    build:
      context: ..
      dockerfile: apps/cuentas/Dockerfile
    environment:
      DB_HOST: db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_CUENTAS: ${DB_DATABASE_CUENTAS}
      CUENTAS_PORT: 4002
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ─── API Gateway (punto unico de entrada HTTP, orquesta TCP) ───
  gateway:
    env_file:
      - ../.env
    build:
      context: ..
      dockerfile: apps/sistema_bancario/Dockerfile
    environment:
      PORT: 3000
      SVC_TRANSACCIONES_HOST: svc-transacciones
      SVC_TRANSACCIONES_PORT: 4003
    ports:
      - "3000:3000"
    depends_on:
      svc-transacciones:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
